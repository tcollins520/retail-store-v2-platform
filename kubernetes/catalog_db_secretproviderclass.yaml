# ------------------------------------------------------------------------------
# SecretProviderClass
#
# Retrieves the Amazon RDS credentials stored in AWS Secrets Manager
# using Amazon EKS Pod Identity.
#
# The Secrets Store CSI Driver synchronizes the credentials into
# a Kubernetes Secret consumed by the Catalog microservice.
# ------------------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: catalog-db-secrets
  namespace: default
spec:
  provider: aws
  parameters:
    region: us-east-1
    usePodIdentity: "true"
    objects: |
      - objectName: arn:aws:secretsmanager:us-east-1:162663626265:secret:rds!db-4cff416a-ccff-4333-86cc-53f94d3366e0-NW61TF
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "username"
          - path: "password"
            objectAlias: "password"
  # store the retrieved secrets in a Kubernetes Secret  and make them available to the Catalog microservice
  secretObjects:
    - secretName: catalog-db
      type: Opaque
      data:
        - objectName: username
          key: RETAIL_CATALOG_PERSISTENCE_USER
        - objectName: password
          key: RETAIL_CATALOG_PERSISTENCE_PASSWORD