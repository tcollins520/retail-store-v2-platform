apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "checkout.fullname" . }}
data:
  RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: {{ .Values.app.persistence.provider | quote }}
  RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL: {{ .Values.app.persistence.redisUrl | quote }}
  RETAIL_CHECKOUT_ENDPOINTS_ORDERS: {{ .Values.app.endpoints.orders | quote }}